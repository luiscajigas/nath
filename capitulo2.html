<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Capítulo II ✿</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Dancing+Script:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --pink-300: #ff8fb8;
      --pink-400: #f76597;
      --pink-500: #e83e75;
      --text-dark: #4a2035;
      --text-mid:  #7d3f5a;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #fff8fb 0%, #fdf0f5 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Cormorant Garamond', serif;
      animation: fadeIn 0.8s ease;
      gap: 2rem;
    }
    @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

    h1 {
      font-family: 'Pinyon Script', cursive;
      font-size: clamp(3rem, 8vw, 6rem);
      font-weight: 400;
      color: var(--text-dark);
    }
    p {
      font-family: 'Dancing Script', cursive;
      font-size: 1.3rem;
      color: var(--text-mid);
      opacity: 0.8;
    }
    .btn {
      font-family: 'Dancing Script', cursive;
      font-size: 1rem;
      color: var(--pink-500);
      background: none;
      border: 1px solid rgba(232, 62, 117, 0.3);
      border-radius: 50px;
      padding: 0.6rem 1.5rem;
      cursor: pointer;
      transition: all 0.25s ease;
    }
    .btn:hover { background: rgba(232, 62, 117, 0.06); border-color: var(--pink-400); }
    .ornament { font-family: 'Cormorant Garamond', serif; color: var(--pink-300); font-size: 1.5rem; letter-spacing: 0.5em; opacity: 0.6; }
  </style>
</head>
<body>
  <div class="ornament">~ ✿ ~</div>
  <h1>Capítulo II</h1>
  <p>Pronto, aquí vendrá algo muy especial…</p>
  <button class="btn" onclick="history.back()">← Volver al capítulo uno</button>
  <div class="ornament">~ ✦ ~</div>
</body>
</html>
