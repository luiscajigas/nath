  <style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; }

:root {
  --font-script:  'Pinyon Script', cursive;
  --font-dancing: 'Dancing Script', cursive;
  --font-serif:   'Cormorant Garamond', serif;
}

body {
  background: #fde8f0;
  font-family: var(--font-serif);
  position: relative;
  transition: background 0s;
}

#bgCanvas {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}

.stars {
  position: fixed;
  inset: 0;
  z-index: 1;
  pointer-events: none;
  opacity: 0;
  transition: opacity 3s ease;
}
.stars.visible { opacity: 1; }

.star {
  position: absolute;
  border-radius: 50%;
  background: white;
  animation: twinkle linear infinite;
}
@keyframes twinkle {
  0%, 100% { opacity: 0.2; transform: scale(1); }
  50%       { opacity: 1;   transform: scale(1.4); }
}

.scene {
  position: relative;
  z-index: 3;
  width: 100vw;
  height: 100vh;
  display: flex;
  align-items: stretch;
  overflow: hidden;
  animation: sceneIn 0.7s ease both;
}
@keyframes sceneIn { from{opacity:0} to{opacity:1} }

.left-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2.5rem 2rem 2rem 3rem;
  gap: 2.5rem;
  position: relative;
}

.counter-wrap {
  text-align: center;
  opacity: 0;
  transform: translateY(24px);
  transition: opacity 1.4s ease, transform 1.4s ease;
}
.counter-wrap.visible { opacity: 1; transform: translateY(0); }

.counter-label {
  font-family: var(--font-dancing);
  font-size: clamp(0.95rem, 1.6vw, 1.15rem);
  font-weight: 500;
  letter-spacing: 0.04em;
  color: #e8c0d0;
  margin-bottom: 0.5rem;
  text-shadow: 0 1px 6px rgba(0,0,0,0.4);
  transition: color 3s ease;
}

.counter-number {
  font-family: var(--font-script);
  font-size: clamp(5rem, 11vw, 9rem);
  line-height: 1;
  color: #ffe0ed;
  text-shadow:
    0 0 30px rgba(255,160,200,0.6),
    0 0 60px rgba(255,120,170,0.3),
    0 2px 8px rgba(0,0,0,0.4);
  transition: color 3s ease, text-shadow 3s ease;
}

.counter-sublabel {
  font-family: var(--font-dancing);
  font-size: clamp(1rem, 1.8vw, 1.3rem);
  font-weight: 600;
  color: #ffb3ce;

  text-shadow: 0 1px 8px rgba(0,0,0,0.4);

}

.letter-wrap {
  width: 100%;

  opacity: 0;
  transform: translateY(24px);

.letter-wrap.visible { opacity: 1; transform: translateY(0); }

.letter-card {

<body>

<canvas id="bgCanvas"></canvas>

<!-- Música capítulo 2 — arranca con fade-in desde volumen 0 -->

<script>
// ══════════════════════════════════════════════════
//   CONFIGURACIÓN
// ══════════════════════════════════════════════════
const START_DATE   = new Date("2024-04-11T00:00:00");
const LETTER_TEXT  = "Cada día de este contador es un recuerdo, una razón para agradecerte y un recordatorio más de lo feliz que soy a tu lado, si pudiera ir al pasado volveria a elegirte una y otra vez y como te dije una vez si tuviera mil vidas en las mil volveria a conocerte porque eres la persona con la que quiero seguir compartiendo mi vida";
const TYPING_SPEED = 52;

// Secuencia de letras de la canción (Capítulo 2)
// Puedes establecer el tiempo (ms) que permanece cada línea
const LYRICS_CAP2 = [
  { text: "...", time: 3800 },
  { text: "déjame guiarte", time: 3000 },
  { text: "a un lugar", time: 2500 },
  { text: "donde nadie te lastime", time: 3800 },
  { text: "tú estás segura aquí conmigo", time: 3000 },
  { text: "conmigo, conmigo", time: 1000 },
  { text: "...", time: 28000 },
  { text: "la conoci de casualidad", time: 2500 },
  { text: "dije: Realme...", time: 800 },

];

// ══════════════════════════════════════════════════
//   MÚSICA CON FADE-IN Y FADE-OUT
// ══════════════════════════════════════════════════
function startMusicFadeIn() {
  const audio = document.getElementById("music2");
  if (!audio) return;
  
  audio.volume = 0;
  audio.loop = true;

  const tryPlay = () => {
    audio.play().then(() => {
      // Al reproducirse, la función setupMusicFadeOut se encargará
      // del fade-in inicial y del fade-out al final automáticamente
      setupMusicFadeOut(audio);
      
      // Limpiamos los listeners de interacción una vez que ya suena
      document.removeEventListener("click", tryPlay);
      document.removeEventListener("touchstart", tryPlay);
      document.removeEventListener("keydown", tryPlay);
    }).catch(() => {
      console.log("Autoplay bloqueado, esperando interacción...");
    });
  };

  // Intentamos reproducir de inmediato
  tryPlay();

  // Agregamos listeners globales para forzar el inicio al primer toque/clic
  document.addEventListener("click", tryPlay, { once: true });
  document.addEventListener("touchstart", tryPlay, { once: true });
  document.addEventListener("keydown", tryPlay, { once: true });
}

function setupMusicFadeOut(audio) {
  const fadeDuration = 4; // segundos para el desvanecimiento
  const maxVolume = 0.7;
  
  audio.ontimeupdate = () => {
    const timeLeft = audio.duration - audio.currentTime;
    const timePassed = audio.currentTime;
    
    if (timeLeft <= fadeDuration && timeLeft > 0) {
      // Fade Out: Desvanecer al final
      audio.volume = Math.max(0, (timeLeft / fadeDuration) * maxVolume);
    } else if (timePassed <= fadeDuration) {
      // Fade In: Aparecer gradualmente al inicio (para el bucle)
      audio.volume = Math.min(maxVolume, (timePassed / fadeDuration) * maxVolume);
    } else {
      audio.volume = maxVolume;
    }
  };
}

// ══════════════════════════════════════════════════
//   LÓGICA DE LETRAS EN BUCLE
// ══════════════════════════════════════════════════
async function startLyricsLoop() {
  const lyricEl = document.getElementById("lyricLineCap2");
  let index = 0;

  while (true) {
    const lyric = LYRICS_CAP2[index];
    
    // Mostrar letra
    lyricEl.textContent = lyric.text;
    lyricEl.classList.add("visible");
    
    // Esperar el tiempo establecido
    await new Promise(resolve => setTimeout(resolve, lyric.time));
    
    // Ocultar letra
    lyricEl.classList.remove("visible");
    
    // Esperar a que termine la transición de salida antes de la siguiente
    await new Promise(resolve => setTimeout(resolve, 1000));
    
    index = (index + 1) % LYRICS_CAP2.length;
  }
}

// ══════════════════════════════════════════════════
//   DÍAS TRANSCURRIDOS
// ══════════════════════════════════════════════════
function daysSince(date) {
  return Math.floor((Date.now() - date) / (1000 * 60 * 60 * 24));
}

// ══════════════════════════════════════════════════
//   INTERPOLACIÓN DE COLOR (día → noche)
// ══════════════════════════════════════════════════
const SKY_COLORS = [
  { r: 253, g: 232, b: 240 },
  { r: 255, g: 180, b: 130 },
  { r: 120, g:  80, b: 120 },
  { r:  22, g:  22, b:  54 },
  { r:   8, g:   8, b:  28 },
];

function lerpColor(a, b, t) {
  return {
    r: Math.round(a.r + (b.r - a.r) * t),
    g: Math.round(a.g + (b.g - a.g) * t),
    b: Math.round(a.b + (b.b - a.b) * t),
  };
}

function skyColorAt(t) {
  const n   = SKY_COLORS.length - 1;
  const idx = Math.min(Math.floor(t * n), n - 1);
  const frac = (t * n) - idx;
  return lerpColor(SKY_COLORS[idx], SKY_COLORS[idx + 1], frac);
}

function mulberry32(seed) {
  return function () {
    let t = (seed += 0x6D2B79F5);
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

// ══════════════════════════════════════════════════
//   HOJAS (bgCanvas) — optimizadas: 25 en vez de 55
// ══════════════════════════════════════════════════
const bgCanvas = document.getElementById("bgCanvas");
const bgCtx    = bgCanvas.getContext("2d");
let leaves = [];
let nightProgress = 0;

function resizeBg() {
  bgCanvas.width  = window.innerWidth;
  bgCanvas.height = window.innerHeight;
}

class Leaf {
  constructor() { this.reset(true); }
  reset(init = false) {
    this.x    = Math.random() * bgCanvas.width;
    this.y    = init ? Math.random() * bgCanvas.height : -20;
    this.size = 4 + Math.random() * 7;
    this.rot  = Math.random() * Math.PI * 2;
    this.rotSpeed = (Math.random() - 0.5) * 0.035;
    this.vx   = (Math.random() - 0.5) * 0.7;
    this.vy   = 0.4 + Math.random() * 0.65;
    this.sway = Math.random() * Math.PI * 2;
    this.swaySpeed = 0.01 + Math.random() * 0.018;
  }
  update() {
    this.sway += this.swaySpeed;
    this.x    += this.vx + Math.sin(this.sway) * 0.45;
    this.y    += this.vy;
    this.rot  += this.rotSpeed;
    if (this.y > bgCanvas.height + 20) this.reset();
  }
  draw(ctx) {
    const day   = { r: 200, g: 140, b: 160 };
    const night = { r: 100, g:  60, b:  90 };
    const c     = lerpColor(day, night, nightProgress);
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rot);
    ctx.fillStyle = `rgba(${c.r},${c.g},${c.b},${0.3 + Math.random() * 0.25})`;
    ctx.beginPath();
    ctx.ellipse(0, 0, this.size * 0.38, this.size, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

function initLeaves() {
  leaves = Array.from({ length: 25 }, () => new Leaf());
}

let lastBgFrame = 0;
function animateBg(now) {
  requestAnimationFrame(animateBg);
  // Throttle a 30 fps para hojas (no necesitan 60)
  if (now - lastBgFrame < 33) return;
  lastBgFrame = now;
  bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
  leaves.forEach(l => { l.update(); l.draw(bgCtx); });
}

// ══════════════════════════════════════════════════
//   ESTRELLAS (DOM, 60 en vez de 90)
// ══════════════════════════════════════════════════
function createStars() {
  const container = document.getElementById("stars");
  const frag = document.createDocumentFragment();
  for (let i = 0; i < 60; i++) {
    const s = document.createElement("div");
    s.classList.add("star");
    const size = 1 + Math.random() * 2;
    s.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}%;top:${Math.random()*70}%;animation-duration:${2+Math.random()*3}s;animation-delay:${Math.random()*4}s;`;
    frag.appendChild(s);
  }
  container.appendChild(frag);
}

// ══════════════════════════════════════════════════
//   ÁRBOL — ramas precalculadas con RNG determinista
//   Solo se recalcula en resize; colores se interpolan
//   en draw sin Math.random()
// ══════════════════════════════════════════════════
const treeCanvas = document.getElementById("treeCanvas");
const treeCtx    = treeCanvas.getContext("2d");
let treeAlpha = 0;
let treeSegments = []; // geometría precalculada
let treeFlowers  = [];

function resizeTree() {
  const W = Math.round(window.innerWidth * 0.42);
  const H = window.innerHeight;
  treeCanvas.width  = W;
  treeCanvas.height = H;
  treeCanvas.style.width  = W + "px";
  treeCanvas.style.height = H + "px";
  buildTreeGeometry(W, H);
}

function buildTreeGeometry(W, H) {
  treeSegments = [];
  treeFlowers  = [];
  const rand = mulberry32(0xA12B3C4D);

  const rootX  = W * 0.72;
  const trunkTopX = rootX - 10;
  const trunkTopY = H - H * 0.52;

  function branch(x, y, angle, length, width, depth) {
    if (depth === 0 || length < 3) return;
    const nx = x + Math.cos(angle) * length;
    const ny = y - Math.sin(angle) * length;
    const cx = (x + nx) / 2 + (rand() - 0.5) * length * 0.15;
    const cy = (y + ny) / 2 + (rand() - 0.5) * length * 0.10;
    treeSegments.push({ x1:x, y1:y, cx, cy, x2:nx, y2:ny, w: Math.max(0.5, width), depth });
    if (depth <= 3) {
      for (let p = 0; p < 3 + depth; p++) {
        const pr = 1.5 + depth * 0.8;
        const pa = angle + (rand() - 0.5) * 1.2;
        treeFlowers.push({
          x: nx + Math.cos(pa) * pr * 2.5,
          y: ny - Math.sin(pa) * pr * 2.5,
          r: pr,
          ci: depth % 3,
        });
      }
    }
    const spread = 0.28 + depth * 0.03;
    branch(nx, ny, angle + spread + 0.1, length * 0.68, width * 0.65, depth - 1);
    branch(nx, ny, angle - spread,       length * 0.72, width * 0.68, depth - 1);
    if (depth > 5) branch(nx, ny, angle + spread * 0.4, length * 0.55, width * 0.5, depth - 2);
  }

  branch(trunkTopX,     trunkTopY,      Math.PI/2 + 0.22, H * 0.27, 9, 10);
  branch(trunkTopX,     trunkTopY,      Math.PI/2 - 0.08, H * 0.30, 8, 10);
  branch(trunkTopX + 5, trunkTopY + 40, Math.PI/2 + 0.45, H * 0.22, 7,  9);
  branch(trunkTopX - 5, trunkTopY + 80, Math.PI/2 - 0.35, H * 0.20, 6,  8);
  branch(trunkTopX,     trunkTopY + 55, Math.PI/2 + 0.72, H * 0.18, 5,  8);
}

function drawTree() {
  const W = treeCanvas.width;
  const H = treeCanvas.height;
  treeCtx.clearRect(0, 0, W, H);

  const trunkDay   = { r: 90, g: 55, b: 35 };
  const trunkNight = { r: 35, g: 20, b: 30 };
  const trunkC     = lerpColor(trunkDay, trunkNight, nightProgress);

  const leafDay   = [{ r:220,g:120,b:140 },{ r:240,g:160,b:100 },{ r:180,g:100,b:130 }];
  const leafNight = [{ r: 80,g: 40,b: 70 },{ r: 60,g: 30,b: 55 },{ r: 50,g: 20,b: 50 }];
  const leafColors = leafDay.map((d,i) => lerpColor(d, leafNight[i], nightProgress));
  const glowAlpha  = nightProgress * 0.5;

  treeCtx.save();
  treeCtx.globalAlpha = treeAlpha;
  treeCtx.lineCap = "round";

  const rootX = W * 0.72;
  // Raíces
  treeCtx.strokeStyle = `rgb(${trunkC.r},${trunkC.g},${trunkC.b})`;
  treeCtx.lineWidth = 3;
  for (let r = 0; r < 5; r++) {
    const angle = (Math.PI * 0.5) + (r - 2) * 0.22;
    treeCtx.beginPath();
    treeCtx.moveTo(rootX, H);
    treeCtx.quadraticCurveTo(
      rootX + Math.cos(angle) * 50, H - 20,
      rootX + Math.cos(angle) * 90, H - 8
    );
    treeCtx.globalAlpha = treeAlpha * (0.3 + r * 0.1);
    treeCtx.stroke();
  }
  treeCtx.globalAlpha = treeAlpha;

  // Tronco
  treeCtx.strokeStyle = `rgb(${trunkC.r},${trunkC.g},${trunkC.b})`;
  treeCtx.lineWidth = 22;
  treeCtx.beginPath();
  treeCtx.moveTo(rootX, H);
  treeCtx.bezierCurveTo(rootX - 5, H - H*0.18, rootX - 15, H - H*0.38, rootX - 10, H - H*0.52);
  treeCtx.stroke();

  // Ramas (geometría precalculada, solo colores cambian)
  for (const s of treeSegments) {
    const progress = 1 - s.depth / 10;
    const c = lerpColor(trunkC, leafColors[s.depth % 3], Math.max(0, progress - 0.4) * 2);
    treeCtx.strokeStyle = `rgb(${c.r},${c.g},${c.b})`;
    treeCtx.lineWidth = s.w;
    treeCtx.beginPath();
    treeCtx.moveTo(s.x1, s.y1);
    treeCtx.quadraticCurveTo(s.cx, s.cy, s.x2, s.y2);
    treeCtx.stroke();
  }

  // Flores (sin shadowBlur)
  for (const f of treeFlowers) {
    const lc = leafColors[f.ci];
    treeCtx.fillStyle = `rgba(${lc.r},${lc.g},${lc.b},${0.55 + glowAlpha})`;
    treeCtx.beginPath();
    treeCtx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
    treeCtx.fill();
  }

  treeCtx.restore();
}

// ══════════════════════════════════════════════════
//   CONTADOR ANIMADO
// ══════════════════════════════════════════════════
function animateCounter(target) {
  const el      = document.getElementById("counterNumber");
  const duration = 2200;
  const start    = performance.now();

  return new Promise((resolve) => {
    function tick(now) {
      const t = Math.min((now - start) / duration, 1);
      const ease = 1 - Math.pow(1 - t, 3);
      el.textContent = Math.round(ease * target);
      if (t < 1) requestAnimationFrame(tick);
      else { el.textContent = target; resolve(); }
    }
    requestAnimationFrame(tick);
  });
}

// ══════════════════════════════════════════════════
//   MÁQUINA DE ESCRIBIR
// ══════════════════════════════════════════════════
function startTypewriter() {
  const el     = document.getElementById("letterBody");
  const cursor = document.getElementById("letterCursor");
  let idx = 0;
  function type() {
    if (idx >= LETTER_TEXT.length) { cursor.style.display = "none"; return; }
    el.textContent += LETTER_TEXT[idx++];
    el.parentElement.scrollTop = el.parentElement.scrollHeight;
    setTimeout(type, TYPING_SPEED + (Math.random() - 0.5) * 20);
  }
  setTimeout(type, 1400);
}

// ══════════════════════════════════════════════════
//   TRANSICIÓN NOCHE
// ══════════════════════════════════════════════════
function startNightTransition() {
  const duration  = 8000;
  const startTime = performance.now();
  const stars     = document.getElementById("stars");
  const moon      = document.getElementById("moon");

  function tick(now) {
    const t = Math.min((now - startTime) / duration, 1);
    nightProgress = t;

    const c = skyColorAt(t);
    document.body.style.background = `rgb(${c.r},${c.g},${c.b})`;

    drawTree();

    if (t > 0.45 && !stars.classList.contains("visible")) {
      stars.classList.add("visible");
      moon.classList.add("visible");
    }

    if (t < 1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

// ══════════════════════════════════════════════════
//   SECUENCIA PRINCIPAL
// ══════════════════════════════════════════════════
async function revealUI() {
  document.getElementById("counterWrap").classList.add("visible");
  document.getElementById("letterWrap").classList.add("visible");
  document.getElementById("backBtn").classList.add("visible");

  // Árbol fade-in
  const fadeStart = performance.now();
  const fadeDur   = 2000;
  function fadeTree(now) {
    treeAlpha = Math.min((now - fadeStart) / fadeDur, 1);
    drawTree();
    if (treeAlpha < 1) requestAnimationFrame(fadeTree);
  }
  requestAnimationFrame(fadeTree);

  // Contador → noche
  await new Promise(r => setTimeout(r, 600));
  await animateCounter(daysSince(START_DATE));
  startNightTransition();

  startTypewriter();
}

// ══════════════════════════════════════════════════
//   INIT
// ══════════════════════════════════════════════════
window.addEventListener("resize", () => {
  resizeBg();
  resizeTree();
  drawTree();
});

resizeBg();
resizeTree();
initLeaves();
createStars();
requestAnimationFrame(animateBg);

setTimeout(() => {
  revealUI();
  startMusicFadeIn();
  startLyricsLoop();
}, 100);
</script>
